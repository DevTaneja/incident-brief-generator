version: "3.8"

services:
  backend:
    build: ./backend
    container_name: incident-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    env_file:
      - .env
    networks:
      - incident-network
    depends_on:
      - test-service
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: incident-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - incident-network
    restart: unless-stopped

  test-service:
    build: ./test-service
    container_name: incident-test-service
    ports:
      - "8001:8001"
    environment:
      - ERROR_RATE=0.3
    env_file:
      - .env
    networks:
      - incident-network
    restart: unless-stopped

networks:
  incident-network:
    driver: bridge
